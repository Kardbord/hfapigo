---
name: PR Title Check

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-title-check:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title format
        # TODO: Pin this down to the full SHA prior to release to mitigate vulnerability to supply-chain attacks
        uses: amannn/action-semantic-pull-request@v5
        with:
          requireScope: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for breaking API changes
        id: apidiff
        # TODO: Pin this down to the full SHA prior to release to mitigate vulnerability to supply-chain attacks
        uses: joelanford/go-apidiff@v0
        with:
          base-ref: origin/main
          head-ref: ${{ github.head_ref }}

      - name: Validate breaking change marking
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          HAS_BREAKING_MARKER="$([[ "$TITLE" =~ \! ]] && echo 'true' || echo 'false')"
          API_HAS_BREAKING="${{ steps.apidiff.outputs.breaking }}"

          echo "PR Title: $TITLE"
          echo "Has breaking marker (!): $HAS_BREAKING_MARKER"
          echo "API has breaking changes: $API_HAS_BREAKING"
          echo ""

          if [[ "$API_HAS_BREAKING" == "true" ]] && [[ "$HAS_BREAKING_MARKER" != "true" ]]; then
            echo "❌ Breaking API changes detected but PR title not marked with '!'"
            echo "Example: feat!: remove deprecated method"
            exit 1
          fi

          if [[ "$API_HAS_BREAKING" != "true" ]] && [[ "$HAS_BREAKING_MARKER" == "true" ]]; then
            echo "❌ PR title marked as breaking but no breaking API changes detected"
            exit 1
          fi

          echo "✅ Breaking change marking is correct"
