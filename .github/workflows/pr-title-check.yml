---
name: PR Title Check

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-title-check:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title format
        # TODO: Pin this down to the full SHA prior to release to mitigate vulnerability to supply-chain attacks
        uses: amannn/action-semantic-pull-request@v5
        with:
          requireScope: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check for breaking API changes
        id: apidiff
        # TODO: Pin this down to the full SHA prior to release to mitigate vulnerability to supply-chain attacks
        uses: joelanford/go-apidiff@v0

      - name: Validate breaking change marking
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          TITLE="$PR_TITLE"
          HAS_BREAKING_MARKER="$([[ "$TITLE" =~ ^[a-z]+(\([^)]+\))?!: ]] && echo 'true' || echo 'false')"
          SEMVER_TYPE="${{ steps.apidiff.outputs.semver-type }}"
          API_HAS_BREAKING="$([[ "$SEMVER_TYPE" == "major" ]] && echo 'true' || echo 'false')"

          echo "PR Title: $TITLE"
          echo "Has breaking marker (!): $HAS_BREAKING_MARKER"
          echo "API semver type: $SEMVER_TYPE"
          echo "API has breaking changes: $API_HAS_BREAKING"
          echo ""

          if [[ "$API_HAS_BREAKING" == "true" ]] && [[ "$HAS_BREAKING_MARKER" != "true" ]]; then
            echo "❌ Breaking API changes detected but PR title not marked with '!'"
            echo "Example: feat!: remove deprecated method"
            exit 1
          fi

          echo "✅ Breaking change marking is correct"
