---
name: PR Title Check

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
    branches:
      - main
      - v*-draft

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-title-check:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title format
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        with:
          requireScope: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Check for breaking API changes
        id: apidiff
        uses: joelanford/go-apidiff@60c4206be8f84348ebda2a3e0c3ac9cb54b8f685 # v0.8.3

      - name: Validate breaking change marking
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          SEMVER_TYPE: ${{ steps.apidiff.outputs.semver-type }}
        run: |
          TITLE="$PR_TITLE"
          HAS_BREAKING_MARKER="$([[ "$TITLE" =~ ^[a-z]+(\([^)]+\))?!: ]] && echo 'true' || echo 'false')"
          API_HAS_BREAKING="$([[ "$SEMVER_TYPE" == "major" ]] && echo 'true' || echo 'false')"

          echo "PR Title: $TITLE"
          echo "Has breaking marker (!): $HAS_BREAKING_MARKER"
          echo "API semver type: $SEMVER_TYPE"
          echo "API has breaking changes: $API_HAS_BREAKING"
          echo ""

          if [[ "$API_HAS_BREAKING" == "true" ]] && [[ "$HAS_BREAKING_MARKER" != "true" ]]; then
            echo "❌ Breaking API changes detected but PR title not marked with '!'"
            echo "Example: feat!: remove deprecated method"
            exit 1
          fi

          echo "✅ Breaking change marking is correct"
