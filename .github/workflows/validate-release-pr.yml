---
name: Validate Release PR

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: read
  contents: read

jobs:
  validate-release:
    # Only run on Release Please PRs (created by the release-please-action bot)
    if: github.event.pull_request.user.login == 'release-please[bot]' && github.event.pull_request.user.type == 'Bot'
    name: Validate go.mod for Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract version and validate go.mod
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Release Please PR title format: "chore(main): release v4.1.0"
          VERSION=$(echo "$PR_TITLE" | grep -oP 'v\K[0-9]+\.[0-9]+\.[0-9]+' || echo "")
          MAJOR=$(echo "$VERSION" | cut -d. -f1)

          if [[ -z "$VERSION" ]]; then
            echo "❌ Could not extract version from PR title: $PR_TITLE"
            exit 1
          fi

          echo "📋 Release version: v$VERSION"
          echo "📋 Major version: v$MAJOR"
          echo ""

          # Check if go.mod has the correct major version
          # Go modules omit the /vN suffix for v0 and v1
          MODULE_BASE="github.com/${{ github.repository }}"
          if [[ "$MAJOR" -ge 2 ]]; then
            expected_module="$MODULE_BASE/v$MAJOR"
          else
            expected_module="$MODULE_BASE"
          fi

          if grep -q "^module ${expected_module}$" go.mod; then
            echo "✓ go.mod correctly set to $expected_module"
            exit 0
          else
            echo "❌ FAILED: go.mod module path doesn't match release version"
            echo ""
            echo "Expected go.mod module:"
            echo "  module $expected_module"
            echo ""
            echo "Current go.mod module:"
            grep "^module" go.mod
            echo ""
            echo "📝 To fix: Update go.mod module path to $expected_module"
            exit 1
          fi
