---
name: OpenCode
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      (startsWith(github.event.comment.body, '/opencode ') ||
       startsWith(github.event.comment.body, '/oc ') ||
       github.event.comment.body == '/opencode' ||
       github.event.comment.body == '/oc') &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Parse model from comment
        id: model
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const ALLOWED_MODELS = [
              'openrouter/openrouter/free',
              'openrouter/openrouter/auto',
              'openrouter/deepseek/deepseek-v4-pro',
              'openrouter/deepseek/deepseek-v4-flash',
              'openrouter/moonshotai/kimi-k2.6',
              'openrouter/qwen/qwen3.6-flash',
              'openrouter/mistralai/devstral-2512',
              'openrouter/google/gemini-3.5-flash',
              'openrouter/google/gemma-4-31b-it',
              'openrouter/z-ai/glm-5.1',
              'openrouter/xiaomi/mimo-v2.5',
              'openrouter/minimax/minimax-m2.7',
              'openrouter/ibm-granite/granite-4.1-8b',
              'openrouter/kwaipilot/kat-coder-pro-v2',
              'openrouter/inclusionai/ring-2.6-1t',
              'openrouter/inception/mercury-2',
              'openrouter/anthropic/claude-haiku-4.5',
              'openrouter/anthropic/claude-sonnet-4.6'
            ];
            const body = context.payload.comment.body;
            const match = body.match(/^\/(?:opencode|oc)\s+model=(\S+)/);
            const requested = match ? match[1] : '';
            core.setOutput('model', ALLOWED_MODELS.includes(requested) ? requested : 'openrouter/deepseek/deepseek-v4-flash');

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: anomalyco/opencode/github@d74d166acf40e51146f8547216913a4e787a4bc1 # v1.15.10
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        with:
          model: ${{ steps.model.outputs.model }}
          share: false
