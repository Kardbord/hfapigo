---
name: Unit Tests

on:
  push:
    branches:
      - main
      - v4-draft
  pull_request:
    branches:
      - main
      - v4-draft
  schedule:
    - cron: "35 21 * * 3"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write # Required for OIDC token to upload coverage and test results
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            os-flag: ubuntu
          - os: windows-latest
            os-flag: windows
          - os: macos-latest
            os-flag: macos
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          cache: true
          go-version-file: "go.mod"

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@c4a0df2e75a225d979a444342dd3db752b53619f # v1.13.0

      - name: Test
        run: gotestsum --junitfile junit.xml --format github-actions --format-icons hivis -- -timeout 600s -v -coverprofile=coverage.out -covermode=atomic ./...

      - name: Test (race)
        run: gotestsum --format github-actions --format-icons hivis -- -race -timeout 600s -v ./...

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: coverage.out
          flags: unit,${{ matrix.os-flag }}
          codecov_yml_path: .github/codecov.yml
          disable_search: true
          fail_ci_if_error: false
          use_oidc: true

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.2.1
        with:
          files: junit.xml
          flags: unit,${{ matrix.os-flag }}
          codecov_yml_path: .github/codecov.yml
          disable_search: true
          fail_ci_if_error: false
          use_oidc: true

      - name: Upload test artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-${{ matrix.os }}
          path: |
            junit.xml
            coverage.out
