---
name: Unit Tests

on:
  push:
    branches:
      - main
      - v4-draft
  pull_request:
    branches:
      - main
      - v4-draft
  schedule:
    - cron: "35 21 * * 3"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write # Required for OIDC token to upload coverage and test results
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            os-flag: ubuntu
          - os: windows-latest
            os-flag: windows
          - os: macos-latest
            os-flag: macos
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          cache: true
          go-version-file: "go.mod"

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.13.0

      - name: Test
        run: gotestsum --junitfile junit.xml --format github-actions --format-icons hivis -- -timeout 600s -v -coverprofile=coverage.out -covermode=atomic ./...

      - name: Test (race)
        run: gotestsum --format github-actions --format-icons hivis -- -race -timeout 600s -v ./...

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6.0.0
        with:
          files: coverage.out
          flags: unit,${{ matrix.os-flag }}
          codecov_yml_path: .github/codecov.yml
          disable_search: true
          fail_ci_if_error: false
          use_oidc: true

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1.2.1
        with:
          files: junit.xml
          flags: unit,${{ matrix.os-flag }}
          codecov_yml_path: .github/codecov.yml
          disable_search: true
          fail_ci_if_error: false
          use_oidc: true

      - name: Upload test artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: |
            junit.xml
            coverage.out
