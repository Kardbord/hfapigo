---
name: Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches:
      - main
      - v4-draft
  schedule:
    - cron: "35 21 * * 3"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          cache: true
          go-version-file: "go.mod"

      - name: Test
        run: go test -timeout 600s -v ./...

  unit-tests-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          cache: true
          go-version-file: "go.mod"

      - name: Test (with coverage)
        run: go test -timeout 600s -v -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage to Codecov
        # Skip this job for PRs from forked repositories without access to secrets
        # but allow it for PRs from branches within the main repository
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          flags: unit
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  unit-tests-race:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          cache: true
          go-version-file: "go.mod"

      - name: Test (race)
        run: go test -race -timeout 600s -v ./...
