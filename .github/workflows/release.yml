---
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    # TODO: update this process to reflect docs/release-process.md
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      # ====================================================================
      # Run Release Please
      # ====================================================================
      # Release Please automatically:
      # 1. Analyzes commits since last tag
      # 2. Determines version bump (major/minor/patch)
      # 3. Creates Release PR with version updates:
      #    - Updates go.mod
      #    - Updates internal/sdkversion/version.go
      #    - Generates changelog
      # 4. On Release PR merge, creates:
      #    - Git tag
      #    - GitHub release with changelog
      # ====================================================================
      - name: Run Release Please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          release-type: go
          config-file: .github/release-please-config.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
