---
name: Release

on:
  push:
    branches:
      - main
      - v*-draft

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      # ====================================================================
      # Select release configuration based on branch
      # ====================================================================
      # main        -> stable config (default versioning)
      # v*-draft    -> prerelease config (prerelease versioning)
      # ====================================================================
      - name: Select release config
        id: config
        run: |
          if [[ "${{ github.ref_name }}" == main ]]; then
            echo "config-file=.github/release-please-config.json" >> "$GITHUB_OUTPUT"
            echo "manifest-file=.github/.release-please-manifest.json" >> "$GITHUB_OUTPUT"
          else
            echo "config-file=.github/prerelease-please-config.json" >> "$GITHUB_OUTPUT"
            echo "manifest-file=.github/.prerelease-please-manifest.json" >> "$GITHUB_OUTPUT"
          fi

      # ====================================================================
      # Run Release Please
      # ====================================================================
      # Release Please automatically:
      # 1. Analyzes commits since last tag
      # 2. Determines version bump (major/minor/patch/prerelease)
      # 3. Creates Release PR with version updates:
      #    - Updates go.mod
      #    - Updates internal/sdkversion/version.go
      #    - Generates changelog
      # 4. On Release PR merge, creates:
      #    - Git tag
      #    - GitHub release with changelog
      # ====================================================================
      - name: Run Release Please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          release-type: go
          config-file: ${{ steps.config.outputs.config-file }}
          manifest-file: ${{ steps.config.outputs.manifest-file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
